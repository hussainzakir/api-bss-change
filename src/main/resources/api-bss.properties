# ============================================
# RESILIENCE4J RETRY CONFIGURATION
# ============================================
resilience4j.retry.retry-aspect-order=2
resilience4j.retry.configs.default.max-attempts=2
resilience4j.retry.configs.default.wait-duration=1s
resilience4j.retry.configs.default.enable-exponential-backoff=true
resilience4j.retry.configs.default.exponential-backoff-multiplier=2
resilience4j.retry.configs.default.retry-exceptions=feign.RetryableException,java.net.ConnectException,org.springframework.web.client.HttpServerErrorException,java.io.IOException
resilience4j.retry.instances.flexRate.base-config=default
resilience4j.retry.instances.flexRate.retry-exceptions=org.springframework.web.client.ResourceAccessException,feign.RetryableException,org.springframework.web.client.HttpServerErrorException,org.springframework.web.client.HttpClientErrorException,java.net.ConnectException,java.io.IOException
resilience4j.retry.instances.flexRate.ignore-exceptions=com.trinet.ambis.exception.FlexRateClientException
